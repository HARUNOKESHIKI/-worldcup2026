<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover"><title>W杯2026 トーナメント表</title><style>body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#edf2ff;background:#0b1020}.top{position:sticky;top:0;z-index:2;padding:calc(env(safe-area-inset-top) + 8px) 10px 10px;background:rgba(7,11,22,.88);border-bottom:1px solid rgba(255,255,255,.12)}.bar{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid rgba(255,255,255,.14);border-radius:999px;background:#0e1528;color:#fff;text-decoration:none;padding:10px 13px;font-weight:900;font-size:13px}.btn.g{background:rgba(110,231,183,.18);border-color:rgba(110,231,183,.48)}.hero{margin:12px 10px;padding:14px;border:1px solid rgba(255,255,255,.12);border-radius:18px;background:linear-gradient(135deg,rgba(147,197,253,.18),rgba(110,231,183,.12))}.hero h1{margin:0 0 6px;font-size:25px}.hero p{margin:0;color:#aab6d6;font-size:12px;line-height:1.6}.panel{margin:0 10px 24px;border:1px solid rgba(255,255,255,.12);border-radius:18px;background:rgba(17,24,45,.88);overflow:hidden}.status{padding:10px 12px;color:#cbd5e1;font-size:12px}.viewer{margin:0 8px 8px;background:#fff;border-radius:14px;overflow:auto;-webkit-overflow-scrolling:touch}.board{width:100%;min-width:320px}.board.zoom{width:230%;min-width:1500px}.board svg{display:block;width:100%;height:auto}.note{padding:0 12px 12px;color:#aab6d6;font-size:11px}.list{display:grid;grid-template-columns:1fr;gap:8px;padding:0 8px 12px}.game{border:1px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(15,23,42,.58);padding:10px}.game small{display:block;color:#93c5fd;font-weight:800}.game b{font-size:14px}.rank{font-size:10px;color:#bfdbfe;border:1px solid rgba(110,231,183,.45);border-radius:999px;padding:1px 5px;margin-left:3px}@media(min-width:760px){.hero,.panel,.top .bar{max-width:1180px;margin-left:auto;margin-right:auto}.list{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}}</style></head><body><div class="top"><div class="bar"><a class="btn" href="/">← 試合一覧へ戻る</a><button class="btn g" id="refresh">最新状態に更新</button><button class="btn" id="zoom">拡大表示</button></div></div><section class="hero"><h1>トーナメント表</h1><p>全体表示を優先した参考画像風レイアウトです。細部はピンチ、または「拡大表示」で確認してください。</p></section><section class="panel"><div class="status" id="status">読み込み中…</div><div class="viewer"><div class="board" id="board"></div></div><div class="note">※ 線が交差しないよう、試合カードを外側、勝者枠を内側に分けた固定レイアウトで描画しています。</div><div class="list" id="list"></div></section><script>(()=>{const W=1200,H=860,api='/api/worldcup-scores',board=document.getElementById('board'),status=document.getElementById('status'),list=document.getElementById('list'),zoom=document.getElementById('zoom'),alias={IRN:'IRI',HAI:'HTI'},norm=c=>alias[c]||c,ja={ARG:'アルゼンチン',AUS:'オーストラリア',AUT:'オーストリア',BEL:'ベルギー',BIH:'ボスニア・ヘルツェゴビナ',BRA:'ブラジル',CAN:'カナダ',CIV:'コートジボワール',COD:'DRコンゴ',COL:'コロンビア',CPV:'カーボベルデ',CRO:'クロアチア',CZE:'チェコ',CUW:'キュラソー',DZA:'アルジェリア',ECU:'エクアドル',EGY:'エジプト',ENG:'イングランド',FRA:'フランス',GER:'ドイツ',GHA:'ガーナ',HAI:'ハイチ',HTI:'ハイチ',IRN:'イラン',IRI:'イラン',IRQ:'イラク',JOR:'ヨルダン',JPN:'日本',KOR:'韓国',KSA:'サウジアラビア',MAR:'モロッコ',MEX:'メキシコ',NED:'オランダ',NOR:'ノルウェー',NZL:'ニュージーランド',PAN:'パナマ',PAR:'パラグアイ',POR:'ポルトガル',QAT:'カタール',RSA:'南アフリカ',SCO:'スコットランド',SEN:'セネガル',ESP:'スペイン',SWE:'スウェーデン',SUI:'スイス',TUN:'チュニジア',TUR:'トルコ',URU:'ウルグアイ',USA:'アメリカ',UZB:'ウズベキスタン'},rk={ARG:1,FRA:3,ESP:2,ENG:4,POR:5,BRA:6,MAR:7,NED:8,BEL:9,GER:10,CRO:11,COL:13,MEX:14,SEN:15,URU:16,USA:17,JPN:18,IRN:20,IRI:20,TUR:22,ECU:23,AUT:24,KOR:25,AUS:27,DZA:28,EGY:29,CAN:30,NOR:31,CIV:33,PAN:34,TUN:35,SWE:38,PAR:41,SCO:42,COD:46,UZB:50,QAT:56,IRQ:57,RSA:60,KSA:61,JOR:63,BIH:64,CPV:67,GHA:73,CUW:82,HAI:83,HTI:83,NZL:85};function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function slot(s){return String(s||'未定').replace(/^Third Place Group\s+/i,'').replace(/^Group\s+([A-L])\s+Winner$/i,'$1 1位').replace(/^Group\s+([A-L])\s+2nd Place$/i,'$1 2位').replace(/^(A|B|C|D|E|F|G|H|I|J|K|L)(\/[A-L])+$/i,m=>m.toUpperCase()+' 3位').replace(/^Round of 32\s+(\d+)\s+Winner$/i,'R32-$1 勝者').replace(/^Round of 16\s+(\d+)\s+Winner$/i,'R16-$1 勝者').replace(/^Quarterfinal\s+(\d+)\s+Winner$/i,'QF-$1 勝者').replace(/^Semifinal\s+(\d+)\s+Winner$/i,'準決勝$1 勝者').replace(/^Semifinal\s+(\d+)\s+Loser$/i,'準決勝$1 敗者')}function tm(c){c=c||{};let code=norm(c.abbr||'');return{code,name:ja[code]||slot(c.name||code||'未定'),rank:rk[code]||''}}function stg(s){return{'round-of-32':'r32','round-of-16':'r16',quarterfinals:'qf',semifinals:'sf','3rd-place-match':'third',final:'final'}[s]||''}function jst(d){return d?new Date(d).toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}):'未定'}function mt(e){let c=e.competitors||[];return{stage:stg(e.stage),date:e.date,status:e.completed?'終了':(e.inProgress?'試合中':'予定'),a:tm(c[0]),b:tm(c[1]),sa:c[0]?.score,sb:c[1]?.score,live:e.inProgress,done:e.completed}}function sh(s,n=11){s=String(s||'未定');return s.length>n?s.slice(0,n-1)+'…':s}function nm(t){return esc(sh(t.name))+(t.rank?' '+t.rank+'位':'')}function date(m){return (m.done||m.live)?`${m.sa??'—'}-${m.sb??'—'} / ${m.status}`:`${jst(m.date)} / ${m.status}`}function txt(x,y,t,a=''){return`<text x="${x}" y="${y}" ${a}>${t}</text>`}function line(a,b){let m=(a.x+b.x)/2;return`<polyline points="${a.x},${a.y} ${m},${a.y} ${m},${b.y} ${b.x},${b.y}" fill="none" stroke="#b7b7b7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>`}function outer(x,y,m,l,side){let anc=side==='l'?'end':'start',tx=side==='l'?x-10:x+10;return`<g>${txt(tx,y-17,l,`text-anchor="${anc}" fill="#0f766e" font-size="10" font-weight="900"`)}${txt(tx,y+1,nm(m.a),`text-anchor="${anc}" fill="#111827" font-size="13" font-weight="800"`)}${txt(tx,y+20,nm(m.b),`text-anchor="${anc}" fill="#111827" font-size="13" font-weight="800"`)}${txt(tx,y+37,esc(date(m)),`text-anchor="${anc}" fill="#6b7280" font-size="10" font-weight="700"`)}</g>`}function box(x,y,m,l,w=112,h=50){return`<g><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8" fill="#fff" stroke="#d1d5db"/>${txt(x+8,y+14,l,'fill="#0f766e" font-size="9" font-weight="900"')}${txt(x+8,y+32,esc(sh(m.a.name,10)), 'fill="#111827" font-size="11" font-weight="800"')}${txt(x+8,y+45,esc(sh(m.b.name,10)), 'fill="#111827" font-size="11" font-weight="800"')}</g>`}function draw(ev){let g={r32:[],r16:[],qf:[],sf:[],third:[],final:[]};ev.map(mt).filter(m=>m.stage).forEach(m=>g[m.stage].push(m));Object.values(g).forEach(a=>a.sort((x,y)=>new Date(x.date)-new Date(y.date)));let e={a:{name:'未定'},b:{name:'未定'},date:'',status:'予定'},ys=Array.from({length:8},(_,i)=>82+i*92),L={r32:220,r16:340,qf:455,sf:535},R={r32:980,r16:860,qf:745,sf:665},p={},s='<svg viewBox="0 0 1200 860"><rect width="1200" height="860" fill="#fff"/><text x="600" y="34" text-anchor="middle" fill="#111827" font-size="26" font-weight="900">トーナメント表</text><g fill="#111827" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">';for(let i=0;i<8;i++){p['l32'+i]={x:L.r32,y:ys[i]};p['r32'+i]={x:R.r32,y:ys[i]};s+=outer(L.r32,ys[i],g.r32[i]||e,'R32-'+(i+1),'l')+outer(R.r32,ys[i],g.r32[i+8]||e,'R32-'+(i+9),'r')}function center(a,b){return(a.y+b.y)/2}for(let i=0;i<4;i++){let y=center(p['l32'+i*2],p['l32'+i*2+1]);p['l16'+i]={x:L.r16,y};s+=box(L.r16-56,y-25,g.r16[i]||e,'R16-'+(i+1));y=center(p['r32'+i*2],p['r32'+i*2+1]);p['r16'+i]={x:R.r16,y};s+=box(R.r16-56,y-25,g.r16[i+4]||e,'R16-'+(i+5))}for(let i=0;i<2;i++){let y=center(p['l16'+i*2],p['l16'+i*2+1]);p['lq'+i]={x:L.qf,y};s+=box(L.qf-56,y-25,g.qf[i]||e,'QF-'+(i+1));y=center(p['r16'+i*2],p['r16'+i*2+1]);p['rq'+i]={x:R.qf,y};s+=box(R.qf-56,y-25,g.qf[i+2]||e,'QF-'+(i+3))}p.ls={x:L.sf,y:center(p.lq0,p.lq1)};p.rs={x:R.sf,y:center(p.rq0,p.rq1)};s+=box(L.sf-56,p.ls.y-25,g.sf[0]||e,'SF-1')+box(R.sf-56,p.rs.y-25,g.sf[1]||e,'SF-2')+box(540,380,g.final[0]||e,'決勝',120,56)+box(540,560,g.third[0]||e,'3決',120,56)+txt(600,370,'🏆','text-anchor="middle" font-size="24"')+txt(600,548,'3位決定戦','text-anchor="middle" fill="#9a6700" font-size="14" font-weight="900"');let lines='';for(let i=0;i<4;i++){lines+=line(p['l32'+i*2],p['l16'+i])+line(p['l32'+i*2+1],p['l16'+i])+line(p['r32'+i*2],p['r16'+i])+line(p['r32'+i*2+1],p['r16'+i])}for(let i=0;i<2;i++){lines+=line(p['l16'+i*2],p['lq'+i])+line(p['l16'+i*2+1],p['lq'+i])+line(p['r16'+i*2],p['rq'+i])+line(p['r16'+i*2+1],p['rq'+i])}lines+=line(p.lq0,p.ls)+line(p.lq1,p.ls)+line(p.rq0,p.rs)+line(p.rq1,p.rs)+line(p.ls,{x:540,y:408})+line(p.rs,{x:660,y:408});s=s.replace('<g fill','#LINES#<g fill').replace('#LINES#',`<g>${lines}</g>`);board.innerHTML=s+'</g></svg>';list.innerHTML=g.r32.map(m=>`<div class="game"><small>${esc(jst(m.date))}</small><b>${esc(m.a.name)}${m.a.rank?`<span class="rank">${m.a.rank}位</span>`:''} vs ${esc(m.b.name)}${m.b.rank?`<span class="rank">${m.b.rank}位</span>`:''}</b></div>`).join('')}async function refresh(){status.textContent='トーナメント表を確認中…';try{let r=await fetch(api+'?ts='+Date.now(),{cache:'no-store'}),j=await r.json();draw(j.events||[]);status.textContent='更新: '+new Date().toLocaleString('ja-JP',{hour12:false})+' / 確定カードを自動反映'}catch(e){status.textContent='取得できませんでした。時間をおいて再読み込みしてください。'}}zoom.onclick=()=>{board.classList.toggle('zoom');zoom.textContent=board.classList.contains('zoom')?'全体表示':'拡大表示'};document.getElementById('refresh').onclick=refresh;document.addEventListener('visibilitychange',()=>{if(!document.hidden)refresh()});setInterval(refresh,60000);refresh()})();</script></body></html>
