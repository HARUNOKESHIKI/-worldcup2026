<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>W杯2026 トーナメント表</title>
<meta name="theme-color" content="#0b1020">
<style>
:root{--bg:#0b1020;--panel:#11182d;--line:rgba(255,255,255,.12);--text:#edf2ff;--muted:#aab6d6;--accent:#6ee7b7;--accent2:#93c5fd;--shadow:0 16px 50px rgba(0,0,0,.28);--radius:18px}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at top left,#1e3a8a 0,#0b1020 38%,#070b16 100%);overflow-x:hidden}header{max-width:1180px;margin:auto;padding:24px 16px 12px}.hero{background:linear-gradient(135deg,rgba(147,197,253,.18),rgba(110,231,183,.12));border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}h1{margin:0 0 8px;font-size:clamp(24px,5vw,40px)}p{margin:0;color:var(--muted);line-height:1.7}.nav{position:sticky;top:0;z-index:5;background:rgba(7,11,22,.78);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.nav-inner{max-width:1180px;margin:auto;padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(147,197,253,.35);background:rgba(147,197,253,.13);color:var(--text);border-radius:999px;padding:10px 13px;font-weight:800;text-decoration:none}.btn.primary{background:rgba(110,231,183,.16);border-color:rgba(110,231,183,.45)}main{max-width:1180px;margin:auto;padding:16px}.panel{border:1px solid var(--line);border-radius:var(--radius);background:rgba(17,24,45,.88);box-shadow:var(--shadow);padding:14px}.head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:10px}.badge{display:inline-flex;align-items:center;border:1px solid rgba(45,212,191,.42);background:rgba(45,212,191,.12);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;color:#ccfbf1;white-space:nowrap}.chips{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 12px}.chips span{display:inline-flex;border:1px solid rgba(255,255,255,.12);background:rgba(15,23,42,.52);border-radius:999px;padding:5px 10px;font-size:12px;color:#dbeafe;font-weight:800}.status{margin:0 0 10px;color:#cbd5e1;font-size:12px;font-weight:700}.wrap{overflow:auto;border:1px solid rgba(255,255,255,.08);border-radius:18px;background:radial-gradient(circle at top,rgba(20,184,166,.10),rgba(2,6,23,.18) 38%),rgba(2,6,23,.54);padding:12px}.board svg{display:block;min-width:2340px;width:2340px;height:auto}.cards{margin-top:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}.game{border:1px solid rgba(255,255,255,.1);border-radius:14px;background:rgba(15,23,42,.58);padding:12px}.game small{display:block;color:#93c5fd;font-weight:800;margin-bottom:5px}.game b{display:block;font-size:15px;line-height:1.45}.rank{display:inline-flex;margin-left:4px;border:1px solid rgba(110,231,183,.45);border-radius:999px;padding:1px 6px;color:#bfdbfe;background:rgba(147,197,253,.12);font-size:11px}@media(max-width:760px){header{padding:16px 10px 10px}.nav-inner,main{padding-left:10px;padding-right:10px}.panel{padding:10px}.head{display:block}.badge{margin-top:10px}.wrap{padding:8px}.chips span{font-size:11px}}
</style>
</head>
<body>
<header><div class="hero"><h1>W杯2026 トーナメント表</h1><p>ラウンド32以降の決勝トーナメントを自動更新で表示します。確定済みカードは国名、未確定枠は順位表記で表示します。</p></div></header>
<div class="nav"><div class="nav-inner"><a class="btn" href="/">← 試合一覧へ戻る</a><button class="btn primary" id="refreshBtn" type="button">最新状態に更新</button></div></div>
<main><section class="panel"><div class="head"><div><h2 style="margin:0 0 6px">決勝トーナメント表</h2><p>横スクロールで全体を確認できます。国名横の小さな数字はFIFAランキングです。</p></div><span class="badge" id="sourceBadge">自動更新</span></div><div class="chips"><span>左右スクロール対応</span><span>FIFAランク併記</span><span>未確定枠も表示</span></div><div class="status" id="status">読み込み中…</div><div class="wrap"><div class="board" id="board"></div></div><div class="cards" id="cards"></div></section></main>
<script>
(function(){
const endpoint='/api/worldcup-scores';
const board=document.getElementById('board'),status=document.getElementById('status'),cards=document.getElementById('cards'),badge=document.getElementById('sourceBadge'),btn=document.getElementById('refreshBtn');
const alias={IRN:'IRI',HAI:'HTI'};const norm=c=>alias[c]||c;
const TEAM_JA={ARG:'アルゼンチン',AUS:'オーストラリア',AUT:'オーストリア',BEL:'ベルギー',BIH:'ボスニア・ヘルツェゴビナ',BRA:'ブラジル',CAN:'カナダ',CIV:'コートジボワール',COD:'DRコンゴ',COL:'コロンビア',CPV:'カーボベルデ',CRO:'クロアチア',CZE:'チェコ',CUW:'キュラソー',DZA:'アルジェリア',ECU:'エクアドル',EGY:'エジプト',ENG:'イングランド',FRA:'フランス',GER:'ドイツ',GHA:'ガーナ',HAI:'ハイチ',HTI:'ハイチ',IRN:'イラン',IRI:'イラン',IRQ:'イラク',JOR:'ヨルダン',JPN:'日本',KOR:'韓国',KSA:'サウジアラビア',MAR:'モロッコ',MEX:'メキシコ',NED:'オランダ',NOR:'ノルウェー',NZL:'ニュージーランド',PAN:'パナマ',PAR:'パラグアイ',POR:'ポルトガル',QAT:'カタール',RSA:'南アフリカ',SCO:'スコットランド',SEN:'セネガル',ESP:'スペイン',SWE:'スウェーデン',SUI:'スイス',TUN:'チュニジア',TUR:'トルコ',URU:'ウルグアイ',USA:'アメリカ',UZB:'ウズベキスタン'};
const RANK={ARG:1,FRA:3,ESP:2,ENG:4,POR:5,BRA:6,MAR:7,NED:8,BEL:9,GER:10,CRO:11,COL:13,MEX:14,SEN:15,URU:16,USA:17,JPN:18,IRN:20,IRI:20,TUR:22,ECU:23,AUT:24,KOR:25,AUS:27,DZA:28,EGY:29,CAN:30,NOR:31,CIV:33,PAN:34,TUN:35,SWE:38,PAR:41,SCO:42,COD:46,UZB:50,QAT:56,IRQ:57,RSA:60,KSA:61,JOR:63,BIH:64,CPV:67,GHA:73,CUW:82,HAI:83,HTI:83,NZL:85};
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
function rank(c){return RANK[norm(c)]||''}
function slot(n){return String(n||'未定').replace(/^Third Place Group\s+/i,'').replace(/^Group\s+([A-L])\s+Winner$/i,'$1 1位').replace(/^Group\s+([A-L])\s+2nd Place$/i,'$1 2位').replace(/^(A|B|C|D|E|F|G|H|I|J|K|L)(\/[A-L])+$/i,m=>m.toUpperCase()+' 3位').replace(/^Round of 32\s+(\d+)\s+Winner$/i,'R32-$1 勝者').replace(/^Round of 16\s+(\d+)\s+Winner$/i,'R16-$1 勝者').replace(/^Quarterfinal\s+(\d+)\s+Winner$/i,'QF-$1 勝者').replace(/^Semifinal\s+(\d+)\s+Winner$/i,'準決勝$1 勝者').replace(/^Semifinal\s+(\d+)\s+Loser$/i,'準決勝$1 敗者')}
function team(comp){const c=norm(comp?.abbr||'');return {code:c,name:TEAM_JA[c]||slot(comp?.name||c||'未定'),rank:rank(c)||''}}
function stageKey(s){return {'round-of-32':'r32','round-of-16':'r16',quarterfinals:'qf',semifinals:'sf','3rd-place-match':'third',final:'final'}[s]||null}
function jst(iso){if(!iso)return '日程未定';const d=new Date(iso);return d.toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false})}
function toMatch(e){const cs=e.competitors||[];return {stage:stageKey(e.stage),date:e.date,status:e.completed?'終了':(e.inProgress?'試合中':'予定'),completed:e.completed,inProgress:e.inProgress,teamA:team(cs[0]),teamB:team(cs[1]),scoreA:cs[0]?.score,scoreB:cs[1]?.score,venue:e.venue||''}}
function se(tag,attrs={}){const el=document.createElementNS('http://www.w3.org/2000/svg',tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el}
function txt(parent,x,y,t,attrs={}){const el=se('text',Object.assign({x,y,fill:'#e5eefc','font-size':'12','font-weight':'700'},attrs));el.textContent=t;parent.appendChild(el);return el}
function short(s,n=17){s=String(s||'未定');return s.length>n?s.slice(0,n-1)+'…':s}
function card(svg,x,y,w,h,m,label){const g=se('g');g.appendChild(se('rect',{x,y,width:w,height:h,rx:16,ry:16,fill:'rgba(15,23,42,0.92)',stroke:'rgba(148,163,184,0.38)','stroke-width':'1.2'}));g.appendChild(se('rect',{x:x+10,y:y+10,width:58,height:18,rx:9,ry:9,fill:'rgba(45,212,191,0.14)',stroke:'rgba(45,212,191,0.35)'}));txt(g,x+39,y+23,label,{'text-anchor':'middle',fill:'#ccfbf1','font-size':'10','font-weight':'900'});txt(g,x+12,y+40,short(m.teamA?.name)+' '+(m.teamA?.rank?m.teamA.rank+'位':''),{'font-size':'12.5'});txt(g,x+12,y+59,short(m.teamB?.name)+' '+(m.teamB?.rank?m.teamB.rank+'位':''),{'font-size':'12.5'});const st=(m.completed||m.inProgress)?((m.scoreA??'—')+'-'+(m.scoreB??'—')+' / '+m.status):(jst(m.date)+' / '+(m.status||'予定'));txt(g,x+12,y+h-12,st,{'font-size':'10.5','font-weight':'700',fill:'#93c5fd'});svg.appendChild(g);return {left:{x,y:y+h/2},right:{x:x+w,y:y+h/2}}}
function conn(svg,a,b){const mid=(a.x+b.x)/2;svg.appendChild(se('polyline',{points:`${a.x},${a.y} ${mid},${a.y} ${mid},${b.y} ${b.x},${b.y}`,fill:'none',stroke:'rgba(148,163,184,0.55)','stroke-width':'2'}))}
function render(list){const grouped={r32:[],r16:[],qf:[],sf:[],third:[],final:[]};list.map(toMatch).filter(m=>m.stage).forEach(m=>grouped[m.stage].push(m));Object.values(grouped).forEach(a=>a.sort((x,y)=>new Date(x.date)-new Date(y.date)));board.innerHTML='';const svg=se('svg',{viewBox:'0 0 2340 1040',role:'img','aria-label':'FIFAワールドカップ2026 決勝トーナメント表'});svg.appendChild(se('rect',{x:0,y:0,width:2340,height:1040,fill:'transparent'}));const bw=220,bh=76,xL=[20,290,560,830],xC=1060,xR=[1300,1570,1840,2110],y0=60,r32Y=Array.from({length:8},(_,i)=>y0+i*118),r16Y=Array.from({length:4},(_,i)=>y0+59+i*236),qfY=Array.from({length:2},(_,i)=>y0+177+i*472),sfY=y0+413,empty={teamA:{name:'未定'},teamB:{name:'未定'},date:'',status:'予定'};[[xL[0]+110,'ラウンド32'],[xL[1]+110,'ラウンド16'],[xL[2]+110,'準々決勝'],[xL[3]+110,'準決勝'],[xC+110,'決勝 / 3位決定戦'],[xR[0]+110,'準決勝'],[xR[1]+110,'準々決勝'],[xR[2]+110,'ラウンド16'],[xR[3]+110,'ラウンド32']].forEach(([x,t])=>txt(svg,x,32,t,{'text-anchor':'middle','font-size':'16','font-weight':'900',fill:'#f8fafc'}));const l32=[],l16=[],lqf=[],r32=[],r16=[],rqf=[];for(let i=0;i<8;i++)l32.push(card(svg,xL[0],r32Y[i],bw,bh,grouped.r32[i]||empty,`R32-${i+1}`));for(let i=0;i<4;i++)l16.push(card(svg,xL[1],r16Y[i],bw,bh,grouped.r16[i]||empty,`R16-${i+1}`));for(let i=0;i<2;i++)lqf.push(card(svg,xL[2],qfY[i],bw,bh,grouped.qf[i]||empty,`QF-${i+1}`));const lsf=card(svg,xL[3],sfY,bw,bh,grouped.sf[0]||empty,'SF-1');for(let i=0;i<8;i++)r32.push(card(svg,xR[3],r32Y[i],bw,bh,grouped.r32[i+8]||empty,`R32-${i+9}`));for(let i=0;i<4;i++)r16.push(card(svg,xR[2],r16Y[i],bw,bh,grouped.r16[i+4]||empty,`R16-${i+5}`));for(let i=0;i<2;i++)rqf.push(card(svg,xR[1],qfY[i],bw,bh,grouped.qf[i+2]||empty,`QF-${i+3}`));const rsf=card(svg,xR[0],sfY,bw,bh,grouped.sf[1]||empty,'SF-2'),fin=card(svg,xC,sfY,bw,bh,grouped.final[0]||empty,'FINAL');card(svg,xC,920,bw,bh,grouped.third[0]||empty,'3RD');for(let i=0;i<4;i++){conn(svg,l32[i*2].right,l16[i].left);conn(svg,l32[i*2+1].right,l16[i].left);conn(svg,r32[i*2].left,r16[i].right);conn(svg,r32[i*2+1].left,r16[i].right)}for(let i=0;i<2;i++){conn(svg,l16[i*2].right,lqf[i].left);conn(svg,l16[i*2+1].right,lqf[i].left);conn(svg,r16[i*2].left,rqf[i].right);conn(svg,r16[i*2+1].left,rqf[i].right)}conn(svg,lqf[0].right,lsf.left);conn(svg,lqf[1].right,lsf.left);conn(svg,rqf[0].left,rsf.right);conn(svg,rqf[1].left,rsf.right);conn(svg,lsf.right,fin.left);conn(svg,rsf.left,fin.right);txt(svg,xC+110,398,'🏆',{'text-anchor':'middle','font-size':'26'});txt(svg,xC+110,906,'3位決定戦',{'text-anchor':'middle','font-size':'14','font-weight':'900',fill:'#fde68a'});board.appendChild(svg);cards.innerHTML=grouped.r32.map(m=>`<div class="game"><small>${esc(jst(m.date))}</small><b>${esc(m.teamA.name)}${m.teamA.rank?`<span class="rank">${m.teamA.rank}位</span>`:''} vs ${esc(m.teamB.name)}${m.teamB.rank?`<span class="rank">${m.teamB.rank}位</span>`:''}</b></div>`).join('')}
async function refresh(){status.textContent='トーナメント表を確認中…';try{const res=await fetch(endpoint+'?ts='+Date.now(),{cache:'no-store'});const data=await res.json();render(data.events||[]);status.textContent='更新: '+new Date().toLocaleString('ja-JP',{hour12:false})+' / 確定済みカードを自動反映';badge.textContent='自動更新（ライブ）'}catch(e){status.textContent='取得できませんでした。時間をおいて再読み込みしてください。';badge.textContent='取得エラー';console.warn(e)}}
btn.addEventListener('click',refresh);document.addEventListener('visibilitychange',()=>{if(!document.hidden)refresh()});setInterval(refresh,60000);refresh();
})();
</script>
</body>
</html>
