<!doctype html>
<html lang='ja'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover'>
<title>W杯2026 トーナメント表</title>
<style>
:root{--bg:#0b1020;--text:#edf2ff;--muted:#aab6d6;--line:rgba(255,255,255,.12);--green:#6ee7b7}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);background:radial-gradient(circle at top left,#1e3a8a 0,#0b1020 38%,#070b16 100%);overflow-x:hidden}.top{position:sticky;top:0;z-index:10;padding:calc(env(safe-area-inset-top) + 8px) 10px 10px;background:rgba(7,11,22,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.top-inner{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:999px;background:#0e1528;color:#fff;text-decoration:none;padding:10px 13px;font-weight:900;font-size:13px}.btn.primary{background:rgba(110,231,183,.18);border-color:rgba(110,231,183,.48)}.hero{padding:12px 10px 8px}.hero-card{border:1px solid var(--line);border-radius:18px;background:linear-gradient(135deg,rgba(147,197,253,.18),rgba(110,231,183,.12));padding:14px}.hero h1{margin:0 0 6px;font-size:25px}.hero p{margin:0;color:var(--muted);font-size:12px;line-height:1.6}.panel{margin:0 10px 24px;border:1px solid var(--line);border-radius:18px;background:rgba(17,24,45,.88);box-shadow:0 16px 50px rgba(0,0,0,.28);overflow:hidden}.status{padding:10px 12px;color:#cbd5e1;font-size:12px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}.badge{display:inline-flex;border:1px solid rgba(45,212,191,.42);background:rgba(45,212,191,.12);border-radius:999px;padding:4px 9px;font-size:11px;font-weight:900;color:#ccfbf1}.viewer{position:relative;margin:0 8px 8px;border:1px solid rgba(255,255,255,.1);border-radius:14px;background:#fff;height:min(62dvh,520px);overflow:hidden}.stage{position:absolute;inset:0;touch-action:none;user-select:none;overflow:hidden}.layer{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}.layer svg{display:block;width:1200px;height:1050px}.controls{position:absolute;right:8px;top:8px;z-index:3;display:flex;gap:6px}.ctl{height:36px;min-width:36px;border-radius:999px;border:1px solid rgba(0,0,0,.18);background:rgba(255,255,255,.88);color:#111827;font-size:18px;font-weight:1000}.ctl.fit{font-size:11px;padding:0 10px}.note{padding:0 12px 12px;color:var(--muted);font-size:11px;line-height:1.55}.list{display:grid;grid-template-columns:1fr;gap:8px;padding:0 8px 12px}.game{border:1px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(15,23,42,.58);padding:10px}.game small{display:block;color:#93c5fd;font-weight:800}.game b{display:block;font-size:14px;line-height:1.45}.rank{font-size:10px;color:#bfdbfe;border:1px solid rgba(110,231,183,.45);border-radius:999px;padding:1px 5px;margin-left:3px}@media(min-width:760px){.hero,.panel{max-width:1180px;margin-left:auto;margin-right:auto}.viewer{height:min(72vh,760px)}.list{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}}
</style>
</head>
<body>
<div class='top'><div class='top-inner'><a class='btn' href='/'>← 試合一覧へ戻る</a><button class='btn primary' id='refresh'>最新状態に更新</button></div></div>
<section class='hero'><div class='hero-card'><h1>トーナメント表</h1><p>最初に全体が一画面に収まる表示です。ピンチ操作、1本指ドラッグ、＋/−ボタンで拡大縮小できます。</p></div></section>
<section class='panel'><div class='status'><span id='status'>読み込み中…</span><span class='badge'>拡大縮小できます</span></div><div class='viewer'><div class='controls'><button class='ctl' id='out'>−</button><button class='ctl' id='in'>＋</button><button class='ctl fit' id='fit'>全体</button></div><div class='stage' id='stage'><div class='layer' id='layer'><div id='board'></div></div></div></div><div class='note'>※ 参考画像のように全体が見える比率にしています。細部は拡大して確認してください。</div><div class='list' id='list'></div></section>
<script>
(function(){
const W=1200,H=1050,api='/api/worldcup-scores';
const board=document.getElementById('board'),statusEl=document.getElementById('status'),listEl=document.getElementById('list'),stage=document.getElementById('stage'),layer=document.getElementById('layer');
const alias={IRN:'IRI',HAI:'HTI'},norm=c=>alias[c]||c;
const ja={ARG:'アルゼンチン',AUS:'オーストラリア',AUT:'オーストリア',BEL:'ベルギー',BIH:'ボスニア・ヘルツェゴビナ',BRA:'ブラジル',CAN:'カナダ',CIV:'コートジボワール',COD:'DRコンゴ',COL:'コロンビア',CPV:'カーボベルデ',CRO:'クロアチア',CZE:'チェコ',CUW:'キュラソー',DZA:'アルジェリア',ECU:'エクアドル',EGY:'エジプト',ENG:'イングランド',FRA:'フランス',GER:'ドイツ',GHA:'ガーナ',HAI:'ハイチ',HTI:'ハイチ',IRN:'イラン',IRI:'イラン',IRQ:'イラク',JOR:'ヨルダン',JPN:'日本',KOR:'韓国',KSA:'サウジアラビア',MAR:'モロッコ',MEX:'メキシコ',NED:'オランダ',NOR:'ノルウェー',NZL:'ニュージーランド',PAN:'パナマ',PAR:'パラグアイ',POR:'ポルトガル',QAT:'カタール',RSA:'南アフリカ',SCO:'スコットランド',SEN:'セネガル',ESP:'スペイン',SWE:'スウェーデン',SUI:'スイス',TUN:'チュニジア',TUR:'トルコ',URU:'ウルグアイ',USA:'アメリカ',UZB:'ウズベキスタン'};
const rk={ARG:1,FRA:3,ESP:2,ENG:4,POR:5,BRA:6,MAR:7,NED:8,BEL:9,GER:10,CRO:11,COL:13,MEX:14,SEN:15,URU:16,USA:17,JPN:18,IRN:20,IRI:20,TUR:22,ECU:23,AUT:24,KOR:25,AUS:27,DZA:28,EGY:29,CAN:30,NOR:31,CIV:33,PAN:34,TUN:35,SWE:38,PAR:41,SCO:42,COD:46,UZB:50,QAT:56,IRQ:57,RSA:60,KSA:61,JOR:63,BIH:64,CPV:67,GHA:73,CUW:82,HAI:83,HTI:83,NZL:85};
let base=1,scale=1,tx=0,ty=0,pts=new Map(),drag=null,pinch=null;
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
function slot(s){return String(s||'未定').replace(/^Third Place Group\s+/i,'').replace(/^Group\s+([A-L])\s+Winner$/i,'$1 1位').replace(/^Group\s+([A-L])\s+2nd Place$/i,'$1 2位').replace(/^(A|B|C|D|E|F|G|H|I|J|K|L)(\/[A-L])+$/i,m=>m.toUpperCase()+' 3位').replace(/^Round of 32\s+(\d+)\s+Winner$/i,'R32-$1 勝者').replace(/^Round of 16\s+(\d+)\s+Winner$/i,'R16-$1 勝者').replace(/^Quarterfinal\s+(\d+)\s+Winner$/i,'QF-$1 勝者').replace(/^Semifinal\s+(\d+)\s+Winner$/i,'準決勝$1 勝者').replace(/^Semifinal\s+(\d+)\s+Loser$/i,'準決勝$1 敗者')}
function team(c){c=c||{};let code=norm(c.abbr||'');return {code,name:ja[code]||slot(c.name||code||'未定'),rank:rk[code]||''}}
function jst(iso){if(!iso)return '未定';return new Date(iso).toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false})}
function stg(s){return {'round-of-32':'r32','round-of-16':'r16',quarterfinals:'qf',semifinals:'sf','3rd-place-match':'third',final:'final'}[s]||''}
function mke(e){let cs=e.competitors||[];return {stage:stg(e.stage),date:e.date,status:e.completed?'終了':(e.inProgress?'試合中':'予定'),teamA:team(cs[0]),teamB:team(cs[1]),scoreA:cs[0]?.score,scoreB:cs[1]?.score,completed:e.completed,inProgress:e.inProgress}}
function se(t,a={}){let el=document.createElementNS('http://www.w3.org/2000/svg',t);Object.entries(a).forEach(([k,v])=>el.setAttribute(k,v));return el}
function text(svg,x,y,str,a={}){let el=se('text',Object.assign({x,y,fill:'#111827','font-size':15,'font-weight':800},a));el.textContent=str;svg.appendChild(el);return el}
function line(svg,x1,y1,x2,y2){svg.appendChild(se('line',{x1,y1,x2,y2,stroke:'#b8b8b8','stroke-width':2}))}
function poly(svg,p){svg.appendChild(se('polyline',{points:p,fill:'none',stroke:'#b8b8b8','stroke-width':2}))}
function nm(t){return (t.name||'未定')+(t.rank?' '+t.rank+'位':'')}
function short(s,n=14){s=String(s||'未定');return s.length>n?s.slice(0,n-1)+'…':s}
function pair(svg,x,y,m,side,label){let ax=side==='l'?x:x+150,ta=side==='l'?'start':'end';let bx=side==='l'?x+150:x;let nameA=short(nm(m.teamA)),nameB=short(nm(m.teamB));text(svg,ax,y,nameA,{'text-anchor':ta});text(svg,ax,y+28,nameB,{'text-anchor':ta});text(svg,ax,y+48,jst(m.date)+' / '+m.status,{'text-anchor':ta,fill:'#6b7280','font-size':12,'font-weight':700});text(svg,ax,y-18,label,{'text-anchor':ta,fill:'#14b8a6','font-size':11,'font-weight':900});line(svg,side==='l'?x+160:x-160,y+8,bx,y+8);line(svg,side==='l'?x+160:x-160,y+34,bx,y+34);line(svg,bx,y+8,bx,y+34);return {mid:{x:bx,y:y+21},y:y+21}}
function box(svg,x,y,m,label){let r=se('rect',{x,y,width:145,height:54,rx:8,fill:'#fff',stroke:'#d1d5db'});svg.appendChild(r);text(svg,x+72,y+15,label,{'text-anchor':'middle',fill:'#14b8a6','font-size':10,'font-weight':900});text(svg,x+72,y+32,short(nm(m.teamA),12),{'text-anchor':'middle','font-size':13});text(svg,x+72,y+48,short(nm(m.teamB),12),{'text-anchor':'middle','font-size':13});return {mid:{x:x+72,y:y+27},left:{x,y:y+27},right:{x:x+145,y:y+27}}}
function draw(events){let g={r32:[],r16:[],qf:[],sf:[],third:[],final:[]};events.map(mke).filter(m=>m.stage).forEach(m=>g[m.stage].push(m));Object.values(g).forEach(a=>a.sort((a,b)=>new Date(a.date)-new Date(b.date)));let svg=se('svg',{viewBox:'0 0 '+W+' '+H,role:'img','aria-label':'トーナメント表'});svg.appendChild(se('rect',{x:0,y:0,width:W,height:H,fill:'#fff'}));text(svg,600,38,'トーナメント表',{'text-anchor':'middle','font-size':26,'font-weight':900});let empty={teamA:{name:'未定'},teamB:{name:'未定'},date:'',status:'予定'};let y=[90,205,320,435,550,665,780,895];let l32=[],r32=[];for(let i=0;i<8;i++)l32.push(pair(svg,80,y[i],g.r32[i]||empty,'l','R32-'+(i+1)));for(let i=0;i<8;i++)r32.push(pair(svg,1120,y[i],g.r32[i+8]||empty,'r','R32-'+(i+9)));let l16=[],r16=[];for(let i=0;i<4;i++){l16.push(box(svg,260,135+i*230,g.r16[i]||empty,'R16-'+(i+1)));r16.push(box(svg,795,135+i*230,g.r16[i+4]||empty,'R16-'+(i+5)))}let lq=[],rq=[];for(let i=0;i<2;i++){lq.push(box(svg,420,250+i*460,g.qf[i]||empty,'QF-'+(i+1)));rq.push(box(svg,635,250+i*460,g.qf[i+2]||empty,'QF-'+(i+3)))}let lsf=box(svg,505,480,g.sf[0]||empty,'SF-1'),rsf=box(svg,550,480,g.sf[1]||empty,'SF-2');let fin=box(svg,527,385,g.final[0]||empty,'決勝'),third=box(svg,527,610,g.third[0]||empty,'3決');for(let i=0;i<4;i++){poly(svg,`${l32[i*2].mid.x},${l32[i*2].mid.y} 235,${l32[i*2].mid.y} 235,${l16[i].mid.y} 260,${l16[i].mid.y}`);poly(svg,`${l32[i*2+1].mid.x},${l32[i*2+1].mid.y} 235,${l32[i*2+1].mid.y} 235,${l16[i].mid.y} 260,${l16[i].mid.y}`);poly(svg,`${r32[i*2].mid.x},${r32[i*2].mid.y} 965,${r32[i*2].mid.y} 965,${r16[i].mid.y} 940,${r16[i].mid.y}`);poly(svg,`${r32[i*2+1].mid.x},${r32[i*2+1].mid.y} 965,${r32[i*2+1].mid.y} 965,${r16[i].mid.y} 940,${r16[i].mid.y}`)}for(let i=0;i<2;i++){poly(svg,`${405},${l16[i*2].mid.y} 405,${lq[i].mid.y} 420,${lq[i].mid.y}`);poly(svg,`${405},${l16[i*2+1].mid.y} 405,${lq[i].mid.y} 420,${lq[i].mid.y}`);poly(svg,`${795},${r16[i*2].mid.y} 795,${rq[i].mid.y} 780,${rq[i].mid.y}`);poly(svg,`${795},${r16[i*2+1].mid.y} 795,${rq[i].mid.y} 780,${rq[i].mid.y}`)}poly(svg,`${565},${lq[0].mid.y} 585,${lq[0].mid.y} 585,${lsf.mid.y} 505,${lsf.mid.y}`);poly(svg,`${565},${lq[1].mid.y} 585,${lq[1].mid.y} 585,${lsf.mid.y} 505,${lsf.mid.y}`);poly(svg,`${635},${rq[0].mid.y} 615,${rq[0].mid.y} 615,${rsf.mid.y} 695,${rsf.mid.y}`);poly(svg,`${635},${rq[1].mid.y} 615,${rq[1].mid.y} 615,${rsf.mid.y} 695,${rsf.mid.y}`);line(svg,650,507,527,412);line(svg,550,507,672,412);text(svg,600,370,'🏆',{'text-anchor':'middle','font-size':28});board.innerHTML='';board.appendChild(svg);listEl.innerHTML=g.r32.map(m=>`<div class='game'><small>${esc(jst(m.date))}</small><b>${esc(m.teamA.name)}${m.teamA.rank?`<span class='rank'>${m.teamA.rank}位</span>`:''} vs ${esc(m.teamB.name)}${m.teamB.rank?`<span class='rank'>${m.teamB.rank}位</span>`:''}</b></div>`).join('');fit(true)}
function clamp(){let r=stage.getBoundingClientRect(),cw=W*scale,ch=H*scale;if(cw<=r.width)tx=(r.width-cw)/2;else tx=Math.max(r.width-cw,Math.min(0,tx));if(ch<=r.height)ty=(r.height-ch)/2;else ty=Math.max(r.height-ch,Math.min(0,ty))}
function apply(){clamp();layer.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`}
function fit(reset=true){let r=stage.getBoundingClientRect();base=Math.min(r.width/W,r.height/H);if(reset)scale=base;if(scale<base)scale=base;tx=(r.width-W*scale)/2;ty=(r.height-H*scale)/2;apply()}
function zoom(f,cx,cy){let r=stage.getBoundingClientRect(),old=scale,ns=Math.max(base,Math.min(base*8,scale*f));let x=(cx??r.width/2),y=(cy??r.height/2),wx=(x-tx)/old,wy=(y-ty)/old;scale=ns;tx=x-wx*ns;ty=y-wy*ns;apply()}
function dist(a,b){return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)}function mid(a,b){return{x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2}}
stage.addEventListener('pointerdown',e=>{stage.setPointerCapture(e.pointerId);pts.set(e.pointerId,e);if(pts.size===1)drag={x:e.clientX,y:e.clientY,tx,ty};if(pts.size===2){let p=[...pts.values()],m=mid(p[0],p[1]),r=stage.getBoundingClientRect();pinch={d:dist(p[0],p[1]),s:scale,tx,ty,x:m.x-r.left,y:m.y-r.top};drag=null}});
stage.addEventListener('pointermove',e=>{if(!pts.has(e.pointerId))return;pts.set(e.pointerId,e);if(pts.size===1&&drag){tx=drag.tx+e.clientX-drag.x;ty=drag.ty+e.clientY-drag.y;apply()}else if(pts.size===2&&pinch){let p=[...pts.values()],m=mid(p[0],p[1]),r=stage.getBoundingClientRect(),ns=Math.max(base,Math.min(base*8,pinch.s*(dist(p[0],p[1])/pinch.d))),wx=(pinch.x-pinch.tx)/pinch.s,wy=(pinch.y-pinch.ty)/pinch.s;scale=ns;tx=(m.x-r.left)-wx*ns;ty=(m.y-r.top)-wy*ns;apply()}});
function up(e){pts.delete(e.pointerId);if(!pts.size){drag=null;pinch=null}else{let p=[...pts.values()][0];drag={x:p.clientX,y:p.clientY,tx,ty};pinch=null}}stage.addEventListener('pointerup',up);stage.addEventListener('pointercancel',up);
document.getElementById('in').onclick=()=>zoom(1.25);document.getElementById('out').onclick=()=>zoom(.8);document.getElementById('fit').onclick=()=>fit(true);window.addEventListener('resize',()=>fit(true));
async function refresh(){statusEl.textContent='トーナメント表を確認中…';try{let r=await fetch(api+'?ts='+Date.now(),{cache:'no-store'}),j=await r.json();draw(j.events||[]);statusEl.textContent='更新: '+new Date().toLocaleString('ja-JP',{hour12:false})+' / 確定カードを自動反映'}catch(e){statusEl.textContent='取得できませんでした。時間をおいて再読み込みしてください。';console.warn(e)}}
document.getElementById('refresh').onclick=refresh;document.addEventListener('visibilitychange',()=>{if(!document.hidden)refresh()});setInterval(refresh,60000);refresh();
})();
</script>
</body>
</html>
