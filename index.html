<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>W杯2026 全日程</title>
<meta name="theme-color" content="#0b1020">
<style>
html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:#0b1020}iframe{border:0;width:100vw;height:100dvh;display:block;background:#0b1020}.toast{position:fixed;left:12px;right:12px;bottom:12px;z-index:999999;background:rgba(7,11,22,.92);color:#fff;border:1px solid rgba(110,231,183,.35);border-radius:14px;padding:10px 12px;font:700 13px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;box-shadow:0 10px 30px rgba(0,0,0,.3);display:none}.toast.show{display:block}
</style>
</head>
<body>
<iframe id="wcframe" src="/old-page" title="W杯2026 全日程"></iframe>
<div id="toast" class="toast">最新結果を反映しました</div>
<script>
(function(){
  const frame=document.getElementById('wcframe');
  const toast=document.getElementById('toast');
  const alias={IRN:'IRI',HAI:'HTI'};
  const norm=c=>alias[c]||c;
  const key=(a,b)=>[norm(a),norm(b)].sort().join('-');
  const esc=v=>String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
  const TEAM_JA={ARG:'アルゼンチン',AUS:'オーストラリア',AUT:'オーストリア',BEL:'ベルギー',BIH:'ボスニア・ヘルツェゴビナ',BRA:'ブラジル',CAN:'カナダ',CIV:'コートジボワール',COD:'DRコンゴ',COL:'コロンビア',CPV:'カーボベルデ',CRO:'クロアチア',CZE:'チェコ',CUW:'キュラソー',DZA:'アルジェリア',ECU:'エクアドル',EGY:'エジプト',ENG:'イングランド',FRA:'フランス',GER:'ドイツ',GHA:'ガーナ',HAI:'ハイチ',HTI:'ハイチ',IRN:'イラン',IRI:'イラン',IRQ:'イラク',JOR:'ヨルダン',JPN:'日本',KOR:'韓国',KSA:'サウジアラビア',MAR:'モロッコ',MEX:'メキシコ',NED:'オランダ',NOR:'ノルウェー',NZL:'ニュージーランド',PAN:'パナマ',PAR:'パラグアイ',POR:'ポルトガル',QAT:'カタール',RSA:'南アフリカ',SCO:'スコットランド',SEN:'セネガル',ESP:'スペイン',SWE:'スウェーデン',SUI:'スイス',TUN:'チュニジア',TUR:'トルコ',URU:'ウルグアイ',USA:'アメリカ',UZB:'ウズベキスタン'};
  const RANK={ARG:1,FRA:3,ESP:2,ENG:4,POR:5,BRA:6,MAR:7,NED:8,BEL:9,GER:10,CRO:11,COL:13,MEX:14,SEN:15,URU:16,USA:17,JPN:18,IRN:20,IRI:20,TUR:22,ECU:23,AUT:24,KOR:25,AUS:27,DZA:28,EGY:29,CAN:30,NOR:31,CIV:33,PAN:34,TUN:35,SWE:38,PAR:41,SCO:42,COD:46,UZB:50,QAT:56,IRQ:57,RSA:60,KSA:61,JOR:63,BIH:64,CPV:67,GHA:73,CUW:82,HAI:83,HTI:83,NZL:85};
  const stageLabel=s=>({"round-of-32":"Round of 32","round-of-16":"Round of 16",quarterfinals:'Quarterfinals',semifinals:'Semifinals',final:'Final','3rd-place-match':'3位決定戦','group-stage':'Group'}[s]||s||'Knockout');
  function jpTeam(c,n){c=norm(c); if(TEAM_JA[c])return TEAM_JA[c]; return String(n||c||'未定').replace('Group ','Group ').replace(' Winner',' 1位').replace(' 2nd Place',' 2位').replace('Third Place','3位').replace('Round of 32 ','R32 ').replace('Round of 16 ','R16 ').replace('Quarterfinal ','準々決勝 ').replace('Semifinal ','準決勝 ')}
  function jstParts(iso){const d=new Date(iso);const date=d.toLocaleDateString('ja-JP',{timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'}).replace(/-/g,'/');const short=d.toLocaleDateString('ja-JP',{timeZone:'Asia/Tokyo',month:'2-digit',day:'2-digit',weekday:'short'});const time=d.toLocaleTimeString('ja-JP',{timeZone:'Asia/Tokyo',hour:'2-digit',minute:'2-digit',hour12:false});return{date,time,short};}
  function show(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(show.t);show.t=setTimeout(()=>toast.classList.remove('show'),2600)}
  function scoreFor(scores,code){code=norm(code);return scores?.[code]??scores?.[Object.keys(alias).find(k=>alias[k]===code)]}
  function makeScorers(list,score){if(Array.isArray(list)&&list.length)return '<small>得点者</small> '+list.map(esc).join('<br>');if(score==='0-0')return '<small>得点者</small> 得点者なし';return '<small>得点者</small> 確認中';}
  function rowStartDate(row){const d=(row.querySelector('td.date')?.textContent||'').match(/(\d{4})\/(\d{2})\/(\d{2})/);const t=(row.querySelector('td.time')?.textContent||'').match(/(\d{2}):(\d{2})/);if(!d||!t)return null;return new Date(`${d[1]}-${d[2]}-${d[3]}T${t[1]}:${t[2]}:00+09:00`);}
  function isLiveByClock(row){const start=rowStartDate(row);if(!start)return false;const diff=Date.now()-start.getTime();return diff>=0&&diff<=3*60*60*1000;}
  function markLivePending(row){const cell=row.querySelector('td.result-cell');if(!cell)return false;const current=cell.textContent.trim();const st=row.querySelector('td.status');if(st)st.textContent='試合中（取得待ち）';if(current.includes('経過取得中')||current.includes('試合中'))return false;const id='pending-'+(row.dataset.gameId||Math.random().toString(36).slice(2));cell.innerHTML='<input class="result-toggle" id="'+id+'" type="checkbox"><label class="show-one" for="'+id+'"><span class="label-show">経過を見る</span><span class="label-hide">隠す</span></label><span class="result-text">経過取得中</span><span class="scorers"><small>状態</small> 試合中の可能性があります。スコア提供元のLIVE反映待ちです。</span>';row.dataset.search=(row.dataset.search||'')+' 試合中 経過取得中 live';return true;}
  function resultHtml(row,e,a,b){const sa=scoreFor(e.scores,a),sb=scoreFor(e.scores,b);const cellId='auto-'+(row.dataset.gameId||e.id||Math.random().toString(36).slice(2));if(sa!=null&&sb!=null&&(e.completed||e.inProgress||Number(sa)!==0||Number(sb)!==0)){const score=sa+'-'+sb;return '<input class="result-toggle" id="'+cellId+'" type="checkbox"><label class="show-one" for="'+cellId+'"><span class="label-show">結果を見る</span><span class="label-hide">隠す</span></label><span class="result-text">'+esc(score)+'</span><span class="scorers">'+makeScorers(e.scorers,score)+'</span>';}return '<span class="result-text">—</span>';}
  function rank(c){return RANK[norm(c)]||''}
  function rankClass(r){return r&&r<=10?' top10':(r&&r<=25?' top25':(r?' low':''))}
  function rankBadge(c){const r=rank(c);return r?'<span class="fifa-rank'+rankClass(r)+'" title="FIFAランキング '+r+'位">'+r+'位</span>':''}
  function rankLine(a,b){const ra=rank(a),rb=rank(b);return (ra||rb)?'<span class="match-rankline">FIFA '+(ra?ra+'位':'—')+' vs '+(rb?rb+'位':'—')+'</span>':''}
  function teamHtml(c,n){const name=jpTeam(c,n);return '<span class="team-with-rank"><span class="team-label">'+esc(name)+'</span>'+rankBadge(c)+'</span>';}
  function panelTeam(c,n){return '<span style="display:inline-flex;align-items:center;gap:5px;flex-wrap:wrap">'+esc(jpTeam(c,n))+(rank(c)?'<span style="font-size:11px;border:1px solid rgba(110,231,183,.45);border-radius:999px;padding:1px 6px;color:#bfdbfe;background:rgba(147,197,253,.12)">'+rank(c)+'位</span>':'')+'</span>'}
  function updateKnockoutRows(doc,events){const kos=events.filter(e=>e.stage&&e.stage!=='group-stage').sort((a,b)=>new Date(a.date)-new Date(b.date));const rows=[...doc.querySelectorAll('tbody#rows tr[data-stage-type="knockout"]')];let changed=0;kos.forEach((e,i)=>{const row=rows[i];if(!row)return;const cs=e.competitors||[];if(cs.length<2)return;const a=norm(cs[0].abbr),b=norm(cs[1].abbr);const jpA=jpTeam(a,cs[0].name),jpB=jpTeam(b,cs[1].name);const p=jstParts(e.date);row.dataset.gameId=e.id||'';row.dataset.teamA=a;row.dataset.teamB=b;row.dataset.search=[p.date,p.time,stageLabel(e.stage),jpA,jpB,rank(a)?rank(a)+'位':'',rank(b)?rank(b)+'位':'',e.venue,e.statusText].join(' ').toLowerCase();const date=row.querySelector('td.date');if(date){date.textContent=p.date.replace(/年/g,'/');date.dataset.short=p.short}const time=row.querySelector('td.time');if(time)time.textContent=p.time;const stage=row.querySelector('td[data-label="グループ/ラウンド"]');if(stage)stage.innerHTML='<span class="tag">'+esc(stageLabel(e.stage))+'</span>';const teams=row.querySelector('td.teams');if(teams)teams.innerHTML='<button class="match-link" data-match="'+esc(jpA+' vs '+jpB)+'" data-stage="'+esc(stageLabel(e.stage))+'" type="button"><span class="match-main">'+teamHtml(a,cs[0].name)+' <span class="vs">vs</span> '+teamHtml(b,cs[1].name)+'</span>'+rankLine(a,b)+'</button>';const res=row.querySelector('td.result-cell');if(res)res.innerHTML=resultHtml(row,e,a,b);const venue=row.querySelector('td.venue');if(venue)venue.textContent=e.venue||'';const st=row.querySelector('td.status');if(st)st.textContent=e.completed?'終了':(e.inProgress?'試合中':'予定');changed++;});return changed;}
  function addKnockoutPanel(doc,events){const kos=events.filter(e=>e.stage==='round-of-32').sort((a,b)=>new Date(a.date)-new Date(b.date));let panel=doc.getElementById('autoKnockoutPanel');if(!panel){panel=doc.createElement('div');panel.id='autoKnockoutPanel';panel.style.cssText='margin:16px 0;padding:14px;border:1px solid rgba(110,231,183,.35);border-radius:16px;background:rgba(7,11,22,.35);';const h=[...doc.querySelectorAll('h1,h2,h3')].find(x=>x.textContent.includes('トーナメント表'));if(h&&h.parentNode)h.parentNode.insertBefore(panel,h.nextSibling);}
    panel.innerHTML='<h3 style="margin:0 0 8px">確定済みラウンド32カード（自動更新）</h3><p style="margin:0 0 10px;color:#aab6d6;font-size:13px">国名が出ているカードは確定分、Group/3位表記は未確定枠です。FIFAランクも分かる国は表示します。</p>'+kos.map(e=>{const p=jstParts(e.date),cs=e.competitors||[],a=norm(cs[0]?.abbr),b=norm(cs[1]?.abbr);return '<div style="display:grid;grid-template-columns:auto 1fr;gap:8px 12px;align-items:center;border-top:1px solid rgba(255,255,255,.12);padding:7px 0"><span style="color:#aab6d6">'+esc(p.short+' '+p.time)+'</span><b>'+panelTeam(a,cs[0]?.name)+' <span style="color:#aab6d6">vs</span> '+panelTeam(b,cs[1]?.name)+'</b></div>'}).join('');}
  function apply(data){const doc=frame.contentDocument;if(!doc)return 0;const evs=data.events||[];const events={};evs.forEach(e=>{const cs=e.competitors||[];if(cs.length<2)return;events[key(cs[0].abbr,cs[1].abbr)]=e;});let changed=updateKnockoutRows(doc,evs);addKnockoutPanel(doc,evs);doc.querySelectorAll('tbody#rows tr[data-team-a][data-team-b]').forEach(row=>{if(row.dataset.stageType==='knockout')return;const a=norm(row.dataset.teamA),b=norm(row.dataset.teamB);const e=events[key(a,b)];if(!e){if(isLiveByClock(row)&&markLivePending(row))changed++;return;}const sa=scoreFor(e.scores,a),sb=scoreFor(e.scores,b);const has=sa!=null&&sb!=null&&(Number(sa)!==0||Number(sb)!==0);if(sa!=null&&sb!=null&&(e.completed||e.inProgress||has)){const cell=row.querySelector('td.result-cell');if(!cell)return;const score=sa+'-'+sb;const old=row.querySelector('.result-text')?.textContent?.trim();if(old===score&&row.querySelector('.scorers'))return;cell.innerHTML=resultHtml(row,e,a,b);const st=row.querySelector('td.status');if(st)st.textContent=e.completed?'終了':'試合中';row.dataset.search=(row.dataset.search||'')+' '+score+' '+(e.completed?'終了':'試合中')+' '+(e.scorers||[]).join(' ');changed++;}else if(isLiveByClock(row)){if(markLivePending(row))changed++;}});const w=frame.contentWindow;['renderGroupOverview','filterRows','updateVisibleCount','renderCompact'].forEach(fn=>{try{if(typeof w[fn]==='function')w[fn]()}catch(e){}});return changed;}
  async function refresh(){try{const res=await fetch('/api/worldcup-scores?ts='+Date.now(),{cache:'no-store'});const data=await res.json();const n=apply(data);if(n)show('最新状態を'+n+'件反映しました');}catch(e){console.warn('score refresh failed',e)}}
  frame.addEventListener('load',()=>setTimeout(refresh,800));setInterval(refresh,60000);document.addEventListener('visibilitychange',()=>{if(!document.hidden)refresh()});
})();
</script>
</body>
</html>
