<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>W杯2026 全日程</title>
<meta name="theme-color" content="#0b1020">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<style>
:root{--bg:#070b16;--panel:#121b34;--text:#f4f7ff;--muted:#aab6d6;--line:rgba(255,255,255,.13);--accent:#6ee7b7;--blue:#93c5fd;--warn:#fcd34d}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at top left,#1e3a8a 0,#0b1020 42%,#070b16 100%)}header{max-width:1100px;margin:auto;padding:24px 16px 14px}h1{margin:0;font-size:clamp(26px,7vw,46px)}.lead{color:var(--muted);margin:.4rem 0 0;line-height:1.7}.toolbar{position:sticky;top:0;z-index:5;background:rgba(7,11,22,.84);backdrop-filter:blur(14px);border-block:1px solid var(--line)}.toolbar-inner{max-width:1100px;margin:auto;padding:10px 14px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.row{display:flex;gap:8px;flex-wrap:wrap}input,select,button{font:inherit;border-radius:999px;border:1px solid var(--line);background:#0e1528;color:var(--text);padding:10px 12px}input{width:100%;min-width:0}button{font-weight:800;cursor:pointer}.primary,button.active{background:rgba(110,231,183,.18);border-color:rgba(110,231,183,.5)}main{max-width:1100px;margin:auto;padding:14px}.status{color:var(--muted);font-size:14px;margin:8px 2px 14px}.cards{display:grid;gap:10px}.card{background:rgba(18,27,52,.94);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 14px 38px rgba(0,0,0,.18)}.meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;color:var(--muted);font-weight:800}.date{font-size:17px;color:var(--text)}.time{font-size:20px;color:var(--accent)}.tag{border:1px solid rgba(147,197,253,.45);background:rgba(147,197,253,.12);border-radius:999px;padding:3px 10px}.teams{font-size:clamp(20px,5.5vw,30px);font-weight:900;margin:12px 0 8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}.vs{color:var(--muted);font-size:.85em}.result{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px}.score{font-size:25px;font-weight:900;letter-spacing:.03em}.pill{border:1px solid var(--line);border-radius:999px;padding:5px 10px;background:#0e1528;font-weight:800}.scorers{color:var(--muted);font-size:14px;margin-top:6px;white-space:pre-wrap}.hidden .score,.hidden .scorers{filter:blur(7px);user-select:none}.venue{color:var(--muted);font-size:14px;margin-top:8px}.panel{display:none}.panel.active{display:block}table{width:100%;border-collapse:collapse;background:rgba(18,27,52,.94);border-radius:16px;overflow:hidden}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left}th{color:var(--muted)}.standings{overflow:auto}.updated{animation:flash 1.6s ease}@keyframes flash{0%{background:rgba(110,231,183,.28)}100%{background:rgba(18,27,52,.94)}}#topBtn{position:fixed;right:18px;bottom:22px;width:58px;height:58px;border-radius:50%;font-size:28px;background:rgba(18,27,52,.9);border:1px solid rgba(147,197,253,.45)}@media(max-width:740px){.toolbar-inner{grid-template-columns:1fr}.venue{display:none}.card{border-radius:14px}}
</style>
</head>
<body id="top">
<header><h1>W杯2026 全日程</h1><p class="lead">日本時間で統一。ページを開いた時点で最新結果を自動取得し、その後60秒ごとに再確認します。</p></header>
<div class="toolbar"><div class="toolbar-inner"><input id="q" placeholder="国名・会場で検索"><div class="row"><button id="tabMatches" class="active">試合一覧</button><button id="tabStandings">順位表</button><button id="toggleAll">結果表示</button><button id="refresh" class="primary">今すぐ確認</button></div></div></div>
<main><div id="status" class="status">最新結果を取得中…</div><section id="matchesPanel" class="panel active"><div id="cards" class="cards"></div></section><section id="standingsPanel" class="panel"><div id="standings" class="standings"></div></section></main>
<button id="topBtn" onclick="scrollTo({top:0,behavior:'smooth'})">↑</button>
<script>
const TEAM_JA={ARG:'アルゼンチン',AUS:'オーストラリア',AUT:'オーストリア',BEL:'ベルギー',BIH:'ボスニア・ヘルツェゴビナ',BRA:'ブラジル',CAN:'カナダ',CIV:'コートジボワール',COD:'DRコンゴ',COL:'コロンビア',CPV:'カーボベルデ',CRO:'クロアチア',CZE:'チェコ',CUW:'キュラソー',DZA:'アルジェリア',ECU:'エクアドル',EGY:'エジプト',ENG:'イングランド',FRA:'フランス',GER:'ドイツ',GHA:'ガーナ',HAI:'ハイチ',HTI:'ハイチ',IRN:'イラン',IRI:'イラン',IRQ:'イラク',JOR:'ヨルダン',JPN:'日本',KOR:'韓国',KSA:'サウジアラビア',MAR:'モロッコ',MEX:'メキシコ',NED:'オランダ',NOR:'ノルウェー',NZL:'ニュージーランド',PAN:'パナマ',PAR:'パラグアイ',POR:'ポルトガル',QAT:'カタール',RSA:'南アフリカ',SCO:'スコットランド',SEN:'セネガル',ESP:'スペイン',SWE:'スウェーデン',SUI:'スイス',TUN:'チュニジア',TUR:'トルコ',URU:'ウルグアイ',USA:'アメリカ',UZB:'ウズベキスタン'};
const RANK={ARG:1,FRA:3,ESP:2,ENG:4,POR:5,BRA:6,NED:8,BEL:9,GER:10,CRO:11,COL:13,MEX:14,SEN:15,URU:16,JPN:18,IRI:20,CAN:30,NOR:31,ECU:23,AUT:24,KOR:25,DZA:28,EGY:29,TUN:35,SWE:38,CZE:40,SCO:42,COD:46,UZB:50,IRQ:57,RSA:60,KSA:61,JOR:63,BIH:64,CPV:67,GHA:73,CUW:82,HTI:83,HAI:83,NZL:85,PAN:34,QAT:56,MAR:7,AUS:32,TUR:27,PAR:39,CIV:33};
const STAGE={};
let games=[], reveal=false;
const $=s=>document.querySelector(s), statusEl=$('#status'), cards=$('#cards');
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
function jp(c,n){return TEAM_JA[c]||n||c||'未定'}
function jst(d){const dt=new Date(d);return {date:dt.toLocaleDateString('ja-JP',{timeZone:'Asia/Tokyo',month:'2-digit',day:'2-digit',weekday:'short'}),time:dt.toLocaleTimeString('ja-JP',{timeZone:'Asia/Tokyo',hour:'2-digit',minute:'2-digit',hour12:false})}}
function normalize(e){const comps=e.competitors||[];const a=comps[0]||{},b=comps[1]||{};const t=jst(e.date);const sa=e.scores?.[a.abbr],sb=e.scores?.[b.abbr];const hasScore=(e.completed||e.inProgress)&&sa!=null&&sb!=null;return{id:e.id,date:t.date,time:t.time,stage:e.stage||STAGE[e.id]||'W杯',venue:e.venue||'',status:e.statusText||'予定',a:a.abbr,b:b.abbr,ta:jp(a.abbr,a.name),tb:jp(b.abbr,b.name),ra:RANK[a.abbr]||'',rb:RANK[b.abbr]||'',score:hasScore?`${sa}-${sb}`:'',scorers:e.scorers||[]}}
function card(g,i){const done=g.score||g.status==='終了'||g.status==='試合中';return `<article class="card ${done&&!reveal?'hidden':''}" data-id="${esc(g.id)}"><div class="meta"><span class="date">${esc(g.date)}</span><span class="time">${esc(g.time)}</span><span class="tag">${esc(g.stage)}</span><span class="pill">${esc(g.status)}</span></div><div class="teams"><span>${esc(g.ta)} ${g.ra?`<span class="pill">FIFA ${g.ra}位</span>`:''}</span><span class="vs">vs</span><span>${esc(g.tb)} ${g.rb?`<span class="pill">FIFA ${g.rb}位</span>`:''}</span></div><div class="result"><button class="toggleOne">${done&&!reveal?'結果を見る':'隠す'}</button><span class="score">${esc(g.score||'—')}</span></div>${g.scorers.length?`<div class="scorers"><b>得点者</b> ${esc(g.scorers.join(' '))}</div>`:(g.score==='0-0'?'<div class="scorers"><b>得点者</b> 得点者なし</div>':'')}<div class="venue">${esc(g.venue)}</div></article>`}
function render(){const q=$('#q').value.trim().toLowerCase();let shown=0;cards.innerHTML=games.map((g,i)=>{const hay=[g.date,g.time,g.ta,g.tb,g.stage,g.venue,g.status,g.score,(g.scorers||[]).join(' ')].join(' ').toLowerCase();if(q&&!hay.includes(q))return '';shown++;return card(g,i)}).join('');statusEl.textContent=`表示中：${shown}試合 / ${games.length}試合　｜　自動更新：ページ表示時・60秒ごと・復帰時`;renderStandings()}
function renderStandings(){const groups=[...new Set(games.filter(g=>/^Group/.test(g.stage)).map(g=>g.stage))];let html='';for(const gr of groups){const table={};games.filter(g=>g.stage===gr).forEach(g=>{[[g.ta,g.score?.split('-')?.[0]],[g.tb,g.score?.split('-')?.[1]]].forEach(([t])=>{if(t&&!table[t])table[t]={team:t,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}});if(!/^\d+-\d+$/.test(g.score||''))return;const[x,y]=g.score.split('-').map(Number);const A=table[g.ta],B=table[g.tb];A.p++;B.p++;A.gf+=x;A.ga+=y;B.gf+=y;B.ga+=x;A.gd=A.gf-A.ga;B.gd=B.gf-B.ga;if(x>y){A.w++;B.l++;A.pts+=3}else if(x<y){B.w++;A.l++;B.pts+=3}else{A.d++;B.d++;A.pts++;B.pts++}});const arr=Object.values(table).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);html+=`<h2>${esc(gr)}</h2><table><thead><tr><th>国</th><th>試</th><th>勝点</th><th>得失</th><th>得</th><th>失</th></tr></thead><tbody>${arr.map(r=>`<tr><td>${esc(r.team)}</td><td>${r.p}</td><td><b>${r.pts}</b></td><td>${r.gd}</td><td>${r.gf}</td><td>${r.ga}</td></tr>`).join('')}</tbody></table>`}$('#standings').innerHTML=html||'<p class="status">順位表はグループ試合データ取得後に表示されます。</p>'}
async function refreshScores(){const started=new Date().toLocaleString('ja-JP',{hour12:false});statusEl.textContent=`自動更新：${started} 最新結果を確認中…`;try{const res=await fetch('/api/worldcup-scores?ts='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error(res.status);const data=await res.json();const next=(data.events||[]).map(normalize).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time,'ja'));const before=JSON.stringify(games.map(g=>[g.id,g.score,g.status]));games=next;render();const after=JSON.stringify(games.map(g=>[g.id,g.score,g.status]));statusEl.textContent=`自動更新：${new Date().toLocaleString('ja-JP',{hour12:false})} 確認済み${before!==after?'（更新あり）':''}`}catch(err){statusEl.textContent='自動更新：取得に失敗しました。少し待って再読み込みしてください。';console.warn(err)}}
document.addEventListener('click',e=>{if(e.target.classList.contains('toggleOne')){const c=e.target.closest('.card');c.classList.toggle('hidden');e.target.textContent=c.classList.contains('hidden')?'結果を見る':'隠す'}});
$('#q').addEventListener('input',render);$('#refresh').onclick=refreshScores;$('#toggleAll').onclick=()=>{reveal=!reveal;$('#toggleAll').textContent=reveal?'結果非表示':'結果表示';render()};$('#tabMatches').onclick=()=>{$('#matchesPanel').classList.add('active');$('#standingsPanel').classList.remove('active');$('#tabMatches').classList.add('active');$('#tabStandings').classList.remove('active')};$('#tabStandings').onclick=()=>{$('#standingsPanel').classList.add('active');$('#matchesPanel').classList.remove('active');$('#tabStandings').classList.add('active');$('#tabMatches').classList.remove('active');renderStandings()};
refreshScores();setInterval(refreshScores,60000);document.addEventListener('visibilitychange',()=>{if(!document.hidden)refreshScores()});
</script>
</body>
</html>
